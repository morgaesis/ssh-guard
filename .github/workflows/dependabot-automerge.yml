name: Dependabot auto-merge

# Auto-approve and auto-merge Dependabot PRs that pass CI, restricted to
# the bump types we are willing to take without human review:
#
#   - security updates (any semver level)
#   - patch and minor cargo updates
#   - all GitHub Actions updates (we already SHA-pin them, so the bump
#     is functionally a vetted-tag → vetted-tag move)
#
# Major version bumps are evaluated by an AI review gate before manual
# review is requested. If the AI gate is unavailable or recommends human
# review, the PR is labeled and @morgaesis is tagged.
#
# Required repo settings (configure once in the GitHub UI):
#   Settings → General → Pull Requests → "Allow auto-merge" enabled
#   Settings → Branches → branch protection on main with the CI checks
#   marked as required (otherwise --auto would merge without waiting).

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Resolve update metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          alert-lookup: true

      - name: Approve and enable auto-merge for safe bumps
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.alert-state == 'open' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" || \
            echo "::warning::Could not approve PR with GITHUB_TOKEN; enabling auto-merge anyway."
          gh pr merge --auto --squash "$PR_URL"

      - name: Prepare major bump review context
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p .cache/dependabot-review
          gh pr diff "$PR_URL" --patch > .cache/dependabot-review/diff.patch
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
            --paginate > .cache/dependabot-review/files.json
          cat > .cache/dependabot-review/prompt.md <<'PROMPT'
          You are reviewing a Dependabot semver-major update for ssh-guard.

          Decide whether a human maintainer must review this PR before auto-merge.
          Base the decision only on the attached diff and changed-file metadata.

          Return only JSON with this schema:
          {
            "manual_review_required": true,
            "risk": "low|medium|high",
            "reason": "one concise sentence",
            "blocking_findings": ["specific issue, or empty array"]
          }

          Require human review for workflow permission expansion, release/signing behavior changes,
          production dependency major upgrades with unclear migration impact, security-sensitive
          dependency changes, lockfile anomalies, or any diff you cannot confidently assess.
          If the update is low-risk and normal CI is enough, set manual_review_required to false.
          PROMPT

      - name: Require AI review secret for major bumps
        id: require_ai_key
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            exit 0
          fi

          gh label create "needs-manual-review" \
            --repo "$GITHUB_REPOSITORY" \
            --color "B60205" \
            --description "Dependabot update requires manual review" \
            --force
          gh pr edit "$PR_URL" --add-label "needs-manual-review"
          gh pr comment "$PR_URL" --body \
            "@morgaesis Major version bump detected, but OPENROUTER_API_KEY is not configured for the AI review gate. Configure it as a Dependabot-accessible secret, then re-run this workflow or review manually."
          exit 1

      - name: Run opencode major bump review
        id: opencode
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEPENDABOT_AI_MODEL: ${{ vars.DEPENDABOT_AI_MODEL || 'openrouter/moonshotai/kimi-k2' }}
        run: |
          npm install -g opencode-ai@latest
          {
            echo "Changed files metadata:"
            cat .cache/dependabot-review/files.json
            echo
            echo "Patch:"
            cat .cache/dependabot-review/diff.patch
          } > .cache/dependabot-review/context.md

          opencode run \
            --model "$DEPENDABOT_AI_MODEL" \
            --file .cache/dependabot-review/prompt.md \
            --file .cache/dependabot-review/context.md \
            "Review this Dependabot major update and return only the requested JSON." \
            > .cache/dependabot-review/result.txt

      - name: Evaluate opencode decision
        id: ai
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        run: |
          node <<'NODE'
          const fs = require("fs");
          const output = fs.readFileSync(".cache/dependabot-review/result.txt", "utf8");
          const match = output.match(/\{[\s\S]*\}/);
          if (!match) {
            console.error("No JSON object found in opencode output.");
            process.exit(1);
          }

          const decision = JSON.parse(match[0]);
          const manual = decision.manual_review_required === true;
          const risk = String(decision.risk || "unknown").replace(/\r?\n/g, " ");
          const reason = String(decision.reason || "No reason provided.").replace(/\r?\n/g, " ");
          const findings = Array.isArray(decision.blocking_findings)
            ? decision.blocking_findings.map(String)
            : [];
          const summary = [
            `AI review risk: ${risk}`,
            `Decision: ${manual ? "human review required" : "human review not required"}`,
            `Reason: ${reason}`,
            findings.length ? `Blocking findings: ${findings.join("; ")}` : "Blocking findings: none",
          ].join("\n");

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `manual=${manual}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `summary<<EOF\n${summary}\nEOF\n`);
          NODE

      - name: Escalate major bump when AI review fails
        if: >-
          failure() &&
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions' &&
          steps.require_ai_key.outcome == 'success' &&
          steps.ai.outputs.manual == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh label create "needs-manual-review" \
            --repo "$GITHUB_REPOSITORY" \
            --color "B60205" \
            --description "Dependabot update requires manual review" \
            --force
          gh pr edit "$PR_URL" --add-label "needs-manual-review"
          gh pr comment "$PR_URL" --body \
            "@morgaesis AI review could not produce a usable decision for this major Dependabot update. Review manually or re-run after fixing the AI review gate."
          exit 1

      - name: Escalate major bump when AI requests review
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions' &&
          steps.ai.outputs.manual == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SUMMARY: ${{ steps.ai.outputs.summary }}
        run: |
          gh label create "needs-manual-review" \
            --repo "$GITHUB_REPOSITORY" \
            --color "B60205" \
            --description "Dependabot update requires manual review" \
            --force
          gh pr edit "$PR_URL" --add-label "needs-manual-review"
          gh pr comment "$PR_URL" --body "@morgaesis AI review recommends human review before merging.

          ${SUMMARY}"
          exit 1

      - name: Approve and enable auto-merge for AI-cleared major bump
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.alert-state != 'open' &&
          steps.meta.outputs.package-ecosystem != 'github_actions' &&
          steps.ai.outputs.manual == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SUMMARY: ${{ steps.ai.outputs.summary }}
        run: |
          gh pr comment "$PR_URL" --body "AI review did not require human review.

          ${SUMMARY}"
          gh pr edit "$PR_URL" --remove-label "needs-manual-review" || true
          gh pr review --approve "$PR_URL" || \
            echo "::warning::Could not approve PR with GITHUB_TOKEN; enabling auto-merge anyway."
          gh pr merge --auto --squash "$PR_URL"
