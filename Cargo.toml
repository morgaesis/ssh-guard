[package]
name = "ssh-guard"
version = "0.0.1"
edition = "2021"
description = "SSH wrapper that sends commands to an LLM for approval before execution"
authors = ["Mörgæsis <morgaesis+git@morgaes.is>"]
license = "MIT"
repository = "https://github.com/morgaesis/ssh-guard"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["rt", "macros", "process"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
regex = "1.0"
dotenvy = "0.15"
