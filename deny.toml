# cargo-deny configuration
# See https://github.com/EmbarkStudios/cargo-deny

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
