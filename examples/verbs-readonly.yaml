# Verb-catalog equivalent of a read-only "allowlist": deterministic,
# LLM-skipping inspection commands for latency-critical observability
# workflows. This replaces the old allow-policy.yaml pattern.
#
# A static-policy `allow` pattern does NOT skip the LLM evaluator (see
# examples/deny-policy.yaml) -- glob matching over a flat command string
# cannot safely grant a bypass, because it cannot parse shell quoting or
# operators (`ls; rm -rf /` matches `ls*`). A verb's parameters are
# structurally validated instead: a fully anchored regex per parameter, and
# single-argv rendering with no shell, so there is no string for an operator
# to escape out of. That is what makes `trusted: true` safe here in a way a
# glob allow pattern is not.
#
# Most of these verbs take no parameters at all -- they are an exact,
# fixed-argv invocation, which is the strongest case: there is nothing to
# inject because there is nothing to substitute.
#
# Load with:
#   guard server start --verbs examples/verbs-readonly.yaml --socket .cache/guard.sock

verbs:
  - name: whoami
    description: Print the effective user
    binary: whoami
    consequence: reversible
    trusted: true

  - name: hostname
    description: Print the host name
    binary: hostname
    consequence: reversible
    trusted: true

  - name: uptime
    description: Print load average and uptime
    binary: uptime
    consequence: reversible
    trusted: true

  - name: disk-usage
    description: Show filesystem usage in human-readable form
    binary: df
    args: ["-h"]
    consequence: reversible
    trusted: true

  - name: memory-usage
    description: Show memory usage in human-readable form
    binary: free
    args: ["-h"]
    consequence: reversible
    trusted: true

  - name: process-list
    description: List all running processes (BSD syntax)
    binary: ps
    args: ["aux"]
    consequence: reversible
    trusted: true

  - name: list-dir
    description: List a directory's contents (long form)
    binary: ls
    args: ["-la", "{path}"]
    params:
      path: { pattern: "^/[a-zA-Z0-9._/-]*$", required: true }
    consequence: reversible
    trusted: true

  - name: read-hosts-file
    description: Read /etc/hosts
    binary: cat
    args: ["/etc/hosts"]
    consequence: reversible
    trusted: true

  - name: ip-addresses
    description: Show network interface addresses
    binary: ip
    args: ["addr"]
    consequence: reversible
    trusted: true

  - name: git-status
    description: Show git working tree status for a repo
    binary: git
    args: ["-C", "{repo}", "status"]
    params:
      repo: { pattern: "^/[a-zA-Z0-9._/-]*$", required: true }
    consequence: reversible
    trusted: true

  - name: service-status
    description: Show a systemd unit's status (read-only)
    binary: systemctl
    args: ["status", "{unit}", "--no-pager"]
    params:
      unit: { pattern: "^[a-zA-Z0-9@._-]+$", required: true }
    consequence: reversible
    trusted: true

  - name: k-get
    description: Read a Kubernetes resource in a namespace
    binary: kubectl
    args: ["get", "{resource}", "-n", "{namespace}"]
    params:
      resource: { pattern: "^[a-z][a-z0-9.]*$", required: true }
      namespace: { pattern: "^[a-z0-9-]{1,63}$", required: true }
    consequence: reversible
    trusted: true

  - name: docker-ps
    description: List running containers
    binary: docker
    args: ["ps"]
    consequence: reversible
    trusted: true
