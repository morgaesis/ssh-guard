# EXAMPLE hybrid (deny fast path + verb allow + LLM fallback) for guard.
# NOT the default.
#
# Guard's default is LLM-only evaluation (single call to openai/gpt-5.4-mini
# via OpenRouter, function-calling, with retries). This file is the opt-in
# "production hardened" pattern for latency-sensitive deployments: a broad
# denylist fast-rejects known-bad patterns before any LLM call, and
# everything else falls through to the LLM.
#
# Load with: guard server start --policy examples/hybrid-policy.yaml
# Or place at: ~/.config/guard/policy.yaml
#
# EVALUATION ORDER (per src/policy.rs):
#   1. Deny patterns -- matched first; matching commands are rejected with
#                       no LLM call. A command matching nothing here falls
#                       through to the LLM, exactly as if no policy were
#                       loaded.
#   2. LLM evaluator -- authoritative decision for everything else.
#
# THIS FILE DOES NOT DEFINE AN ALLOWLIST. A glob `allow` pattern cannot skip
# the LLM evaluator while it is enabled (glob matching over a flat command
# string cannot parse shell quoting or operators, so it cannot be trusted
# with a bypass -- see examples/deny-policy.yaml for the detailed caveats).
# For the latency win a hand-rolled allowlist used to promise, pair this file
# with a verb catalog instead:
#
#   guard server start --policy examples/hybrid-policy.yaml \
#       --verbs examples/verbs-readonly.yaml
#
# A verb's parameters are structurally validated (anchored regex per
# parameter, single-argv rendering, no shell), which is what makes a verb
# safe to mark `trusted: true` (a real, LLM-skipping allow) in a way a glob
# pattern is not.
#
# WHEN TO USE: read-heavy agent workloads where dozens of identical `ls`,
# `ps`, or `kubectl get` calls would each incur a 0.5-2s LLM round-trip --
# pointed at verbs-readonly.yaml for the allow side. The denylist keeps
# obvious footguns off the LLM's plate even before that. Everything ambiguous
# still reaches the LLM, so novel attacks and obfuscated payloads remain
# covered.

policy:
  commands:
    deny:
      # Privilege escalation
      - "sudo su*"
      - "sudo -i*"
      - "sudo -s*"
      - "sudo bash*"
      - "sudo /bin/bash*"
      - "sudo /bin/sh*"
      - "su root*"
      - "su -*"
      - "pkexec*"
      - "doas*"

      # Destructive operations
      - "rm -rf /"
      - "rm -rf /*"
      - "dd *"
      - "mkfs*"
      - "shred *"
      - "wipefs *"

      # Remote code execution / piping to shell
      - "curl * | bash*"
      - "wget * | sh*"
      - "* | bash"
      - "* | bash *"
      - "* | sh"
      - "* | sh *"
      - "eval *"
      - "bash -c *"
      - "sh -c *"

      # Interpreter abuse
      - "python -c *"
      - "python3 -c *"
      - "ruby -e *"
      - "node -e *"
      - "perl -e *"

      # Reverse shells / tunnels
      - "ssh -L*"
      - "ssh -R*"
      - "ssh -D*"
      - "nc -e*"
      - "ncat -e*"
      - "bash -i*>*"

      # System disruption
      - "reboot*"
      - "shutdown*"
      - "poweroff*"
      - "halt*"
      - "kill -9 1"
      - "killall*sshd*"

      # Service / firewall disruption
      - "systemctl mask ssh*"
      - "systemctl stop ssh*"
      - "iptables -F*"
      - "ufw disable*"

      # Kubernetes destructive
      - "kubectl delete namespace*"
      - "kubectl drain*"

      # Env exfiltration via procfs
      - "cat /proc/*/environ*"
      - "strings /proc/*/environ*"

      # Sensitive file access
      - "* /etc/shadow*"
      - "* /etc/sudoers*"
