# EXAMPLE read-only allowlist policy for guard. NOT the default.
#
# Guard's default is LLM-only evaluation (single call to openai/gpt-5.4-nano
# via OpenRouter, function-calling, with retries). This file is an opt-in
# override for deployments where a small, enumerable set of inspection
# commands runs frequently and the LLM latency (~0.5-2s per call) is
# unacceptable for those specific commands.
#
# Load with: guard server start --policy examples/allow-policy.yaml
# Or place at: ~/.config/guard/policy.yaml
#
# SEMANTICS: commands matching an allow pattern bypass the LLM and run
# immediately. Commands that do not match fall through to the LLM evaluator,
# which is still consulted for everything not explicitly listed here. There
# is no implicit deny.
#
# THREAT MODEL: only list commands that are deterministically safe regardless
# of arguments. A pattern like `cat*` is unsafe because it matches
# `cat /etc/shadow`. A pattern like `cat /etc/hosts` is safe because it
# resolves to a single read of a non-sensitive file. Prefer fully-qualified
# patterns over wildcards.
#
# LIMITATIONS: the same glob-matching caveats from deny-policy.yaml apply
# here, and they are more dangerous on the allow side. A shell operator
# inside an allowed command (`ls; rm -rf /`) will bypass the LLM entirely.
# Only use this file if you control the agent's command generation tightly
# enough to trust that the allowlisted patterns cannot be chained.

policy:
  commands:
    allow:
      # Identity and host info
      - "id"
      - "whoami"
      - "hostname"
      - "hostnamectl"
      - "uname -a"
      - "uname -r"
      - "uptime"
      - "date"

      # Process and resource inspection
      - "ps aux"
      - "ps -ef"
      - "top -bn1"
      - "free -h"
      - "df -h"
      - "du -sh /var/log"
      - "vmstat 1 1"
      - "iostat"

      # Filesystem listing (fully-qualified, non-recursive)
      - "ls"
      - "ls -la"
      - "ls /etc"
      - "ls /var/log"
      - "ls /opt"
      - "pwd"

      # Specific safe file reads
      - "cat /etc/hosts"
      - "cat /etc/os-release"
      - "cat /etc/resolv.conf"
      - "cat /proc/cpuinfo"
      - "cat /proc/meminfo"

      # Networking inspection (read-only)
      - "ip addr"
      - "ip route"
      - "ss -tulpn"
      - "ping -c 3 *"

      # Git read-only
      - "git status"
      - "git log --oneline -20"
      - "git branch"
      - "git diff"
      - "git remote -v"

      # Kubernetes read-only
      - "kubectl get *"
      - "kubectl describe *"
      - "kubectl logs *"
      - "kubectl top *"
      - "kubectl version"
      - "kubectl config current-context"

      # Systemd read-only
      - "systemctl status"
      - "systemctl status *"
      - "systemctl is-active *"
      - "systemctl is-enabled *"
      - "journalctl -u * --no-pager -n 100"

      # Container runtime read-only
      - "docker ps"
      - "docker images"
      - "docker logs *"
      - "podman ps"
      - "podman images"
